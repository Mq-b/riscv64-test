name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_FONTCONFIG_DLOPEN: "1"

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            g++ \
            pkg-config \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libdrm-dev \
            libudev-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: riscv64-test-x86_64-unknown-linux-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/riscv64-test
            install_packages: "build-essential gcc g++ pkg-config libwayland-dev wayland-protocols libxkbcommon-dev libdrm-dev libudev-dev"
            build_cmd: cargo build --release --target x86_64-unknown-linux-gnu
            rust_env: RUST_FONTCONFIG_DLOPEN=1
          - target: riscv64gc-unknown-linux-gnu
            artifact_name: riscv64-test-riscv64gc-unknown-linux-gnu
            binary_path: target/riscv64gc-unknown-linux-gnu/release/riscv64-test
            install_packages: "build-essential gcc g++ pkg-config binutils-riscv64-linux-gnu gcc-riscv64-linux-gnu g++-riscv64-linux-gnu libc6-dev-riscv64-cross"
            build_cmd: ./scripts/build-riscv64.sh
            rust_env: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.install_packages }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: ${{ matrix.rust_env }} ${{ matrix.build_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error
